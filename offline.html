<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — LogicLab</title>
  <meta name="theme-color" content="#2563EB">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563EB'/%3E%3Ctext x='50' y='62' font-size='42' font-weight='800' fill='white' text-anchor='middle' font-family='sans-serif'%3ELL%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .offline-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .offline-card {
      max-width: 480px;
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow-lg);
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 2s infinite;
    }
    .offline-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    .offline-message {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .offline-status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: var(--warning);
      color: white;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-card">
      <div class="offline-icon">📡</div>
      <h1 class="offline-title">You're Offline</h1>
      <div class="offline-status">
        <span class="status-dot"></span>
        <span>No Internet Connection</span>
      </div>
      <p class="offline-message">
        It looks like you've lost your internet connection. Don't worry — LogicLab works offline once you've visited a page. Try going back to a previously visited page.
      </p>
      <a href="./index.html" class="btn btn-primary btn-lg" style="display:inline-block;text-decoration:none;">
        🏠 Go to Home
      </a>
      <div style="margin-top:1.5rem;font-size:0.8rem;color:var(--text-tertiary);">
        <a href="./converter.html" style="color:var(--text-tertiary);text-decoration:underline;">Converter</a> ·
        <a href="./gates.html" style="color:var(--text-tertiary);text-decoration:underline;">Logic Gates</a> ·
        <a href="./quiz.html" style="color:var(--text-tertiary);text-decoration:underline;">Quiz</a>
      </div>
    </div>
  </div>

  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
